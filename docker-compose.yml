services:
  coingecko-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: coingecko-dev
    ports:
      - "8081:8081"
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - CI=1
      - EXPO_NO_TELEMETRY=1
      - REACT_NATIVE_PACKAGER_HOSTNAME=192.168.0.3 # ← seu IP aqui
    stdin_open: true
    tty: true